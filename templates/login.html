{% extends "base.html" %}

{% block title %}로그인 | Panda Auction{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>로그인</h1>
    <form method="post">
      <label>
        <span>아이디</span>
        <input name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        <span>비밀번호</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary-button full" type="submit">로그인</button>
    </form>
  </section>
{% endblock %}
