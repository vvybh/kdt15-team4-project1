<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="brand" href="{{ url_for('index') }}">중고 경매</a>
            <nav class="nav" aria-label="주요 메뉴">
                <a href="{{ url_for('auction_list') }}">경매 목록</a>
                <a href="{{ url_for('auction_new') }}">물품 등록</a>
                <a href="{{ url_for('market_check') }}">시세 확인</a>
                <a href="{{ url_for('admin_inspections') }}">관리자 검수</a>
            </nav>
        </div>
    </header>

    <main class="page">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="notice-list">
                    {% for message in messages %}
                        <p class="notice">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script defer src="{{ url_for('static', filename='js/market_chart.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
